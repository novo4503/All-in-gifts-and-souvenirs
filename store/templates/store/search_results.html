<h2>Search results for "{{ query }}"</h2>

{% for product in products %}
    <a href="{% url 'Product_Detail' product.slug %}">
        {% if product.image %}
            <img src="{{ product.image.url }}" width="150">
        {% endif %}
        <h3>{{ product.name }}</h3>
        <p>${{ product.price }}</p>
    </a>
{% empty %}
    <p>No products found.</p>
{% endfor %}
